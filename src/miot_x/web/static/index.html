<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miot-x</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div x-data="app()" x-init="init()" class="max-w-4xl mx-auto p-4">

    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">miot-x</h1>
        <div x-show="loggedIn" class="flex items-center gap-3">
            <span class="text-sm text-green-600">已连接</span>
            <button @click="logout()" class="text-sm text-gray-500 hover:text-red-500">登出</button>
        </div>
    </header>

    <!-- Login Page -->
    <div x-show="!loggedIn" class="flex flex-col items-center justify-center mt-20">
        <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md text-center">
            <h2 class="text-xl font-semibold mb-4">使用小米账号登录</h2>
            <p class="text-gray-500 mb-6 text-sm">登录后可控制米家智能设备</p>

            <button @click="startLogin()"
                    :disabled="loginLoading"
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 px-4 rounded-lg disabled:opacity-50">
                <span x-show="!loginLoading">登录小米账号</span>
                <span x-show="loginLoading">等待授权中...</span>
            </button>

            <!-- 手动模式 -->
            <div x-show="manualMode" class="mt-4 text-left">
                <p class="text-sm text-gray-600 mb-2">请粘贴浏览器跳转后的完整 URL：</p>
                <input x-model="callbackUrl" type="text" placeholder="https://127.0.0.1/?code=..."
                       class="w-full border rounded px-3 py-2 text-sm">
                <button @click="submitCallback()" class="mt-2 w-full bg-blue-500 text-white py-2 rounded text-sm">
                    提交
                </button>
            </div>

            <p x-show="loginError" x-text="loginError" class="mt-3 text-red-500 text-sm"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div x-show="loggedIn">
        <!-- Tabs -->
        <div class="flex border-b mb-4">
            <button @click="tab='devices'" :class="tab==='devices' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-500'"
                    class="px-4 py-2 font-medium">设备</button>
            <button @click="tab='scenes'" :class="tab==='scenes' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-500'"
                    class="px-4 py-2 font-medium">场景</button>
            <button @click="tab='settings'" :class="tab==='settings' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-500'"
                    class="px-4 py-2 font-medium">设置</button>
        </div>

        <!-- Devices Tab -->
        <div x-show="tab==='devices'">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <template x-for="dev in devices" :key="dev.did">
                    <div class="bg-white rounded-lg shadow p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="font-medium" x-text="dev.name"></p>
                                <p class="text-xs text-gray-400" x-text="dev.room || '未分配'"></p>
                            </div>
                            <div class="flex gap-2">
                                <button @click="deviceOn(dev.did)"
                                        class="px-3 py-1 bg-green-100 text-green-700 rounded text-sm hover:bg-green-200">开</button>
                                <button @click="deviceOff(dev.did)"
                                        class="px-3 py-1 bg-red-100 text-red-700 rounded text-sm hover:bg-red-200">关</button>
                            </div>
                        </div>
                        <p class="text-xs mt-1" :class="dev.online ? 'text-green-500' : 'text-gray-400'"
                           x-text="dev.online ? '在线' : '离线'"></p>
                    </div>
                </template>
            </div>
            <p x-show="devices.length === 0" class="text-gray-400 text-center py-8">暂无设备</p>
        </div>

        <!-- Scenes Tab -->
        <div x-show="tab==='scenes'">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <template x-for="scene in scenes" :key="scene.scene_id">
                    <div class="bg-white rounded-lg shadow p-4 flex items-center justify-between">
                        <span class="font-medium" x-text="scene.name"></span>
                        <button @click="runScene(scene.scene_id)"
                                class="px-3 py-1 bg-blue-100 text-blue-700 rounded text-sm hover:bg-blue-200">执行</button>
                    </div>
                </template>
            </div>
            <p x-show="scenes.length === 0" class="text-gray-400 text-center py-8">暂无场景</p>
        </div>

        <!-- Settings Tab -->
        <div x-show="tab==='settings'">
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="font-medium mb-3">家庭选择</h3>
                <template x-for="home in homes" :key="home.home_id">
                    <label class="flex items-center gap-2 py-1">
                        <input type="checkbox" :value="home.home_id" x-model="selectedHomes">
                        <span x-text="home.name + ' (' + home.room_count + ' 个房间)'"></span>
                    </label>
                </template>
                <button @click="saveHomes()" class="mt-3 bg-blue-500 text-white px-4 py-2 rounded text-sm">保存</button>
                <p x-show="homes.length === 0" class="text-gray-400">加载中...</p>
            </div>
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
