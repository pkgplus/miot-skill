    <style>
        body {
            background: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;

            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .frame {
            background: rgba(255, 255, 255, 0.95);
            width: 50%;
            max-width: 600px;
            padding: 40px 45px;
            border-radius: 8px;
            box-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-frame {
            text-align: center;
        }

        .title-frame {
            margin: 20px 0 20px 0;
            font-size: 26px;
            font-weight: 500;
            line-height: 40px;
            color: #000000;
            transition: color 0.3s ease;
        }

        .content-frame {
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.6);
            transition: color 0.3s ease;
            text-align: left;
            line-height: 1.8;
        }

        button {
            background-color: #ff5c00;
            border: none;
            border-radius: 4px;
            padding: 0 20px;
            text-align: center;
            width: 100%;
            display: inline-block;
            font-size: 18px;
            font-weight: 400;
            height: 46px;
            line-height: 46px;
            overflow: hidden;
            position: relative;
            text-overflow: ellipsis;
            transition: all .3s cubic-bezier(.645, .045, .355, 1);
            vertical-align: top;
            white-space: nowrap;
            cursor: pointer;
            color: #fff;
        }

        button:hover {
            background-color: #e55500;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 92, 0, 0.3);
        }

        .text-input-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
        }

        .text-input {
            width: 100%;
            height: 46px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 0 55px 0 15px;
            font-size: 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            color: #666666;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            cursor: text;
        }

        .text-input:focus {
            border-color: #ff5c00;
            box-shadow: 0 0 0 2px rgba(255, 92, 0, 0.2);
        }

        .text-input::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        .copy-button {
            position: absolute;
            right: 2px;
            top: 2px;
            background-color: #ff5c00;
            border: none;
            border-radius: 2px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            color: #fff;
            transition: all .3s cubic-bezier(.645, .045, .355, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 0;
        }

        .copy-button:hover {
            background-color: #e55500;
        }

        .copy-icon {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            display: block;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        #closeButton {
            width: 100%;
            background-color: #bbb;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #closeButton:hover {
            background-color: #999;
        }

        #closeHint {
            color: rgba(0, 0, 0, 0.5);
        }

        /* 深色模式样式 */
        @media (prefers-color-scheme: dark) {
            body {
                background: #121212 !important;
                color: #ffffff !important;
            }

            .frame {
                background: rgba(255, 255, 255, 0.08) !important;
                box-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.3) !important;
            }

            .title-frame {
                color: #ffffff !important;
            }

            .content-frame {
                color: rgba(255, 255, 255, 0.7) !important;
            }

            .text-input {
                border-color: rgba(255, 255, 255, 0.3) !important;
                background: rgba(255, 255, 255, 0.08) !important;
                color: #ffffff !important;
            }

            .text-input::placeholder {
                color: rgba(255, 255, 255, 0.5) !important;
            }

            .copy-icon {
                fill: #ffffff !important;
            }

            button:hover {
                background-color: #e55500 !important;
                transform: translateY(-1px) !important;
                box-shadow: 0 4px 12px rgba(255, 92, 0, 0.4) !important;
            }

            #closeHint {
                color: rgba(255, 255, 255, 0.4) !important;
            }

        function getBrowserLanguage() {
            var language = navigator.language || navigator.userLanguage;
            var langCode = language.toLowerCase();
            if (langCode.startsWith('zh-cn') || langCode.startsWith('zh-hans')) return 'zh-CN';
            if (langCode.startsWith('zh-tw') || langCode.startsWith('zh-hant')) return 'zh-TW';
            if (langCode.startsWith('ja')) return 'ja';
            if (langCode.startsWith('ko')) return 'ko';
            if (langCode.startsWith('en')) return 'en';
            return 'zh-CN';
        }

        function detectThemeChange() {
            var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            function handleThemeChange(e) {
                if (e.matches) {
                    document.body.classList.add('dark-theme');
                    document.body.classList.remove('light-theme');
                } else {
                    document.body.classList.add('light-theme');
                    document.body.classList.remove('dark-theme');
                }
            }
            handleThemeChange(mediaQuery);
            mediaQuery.addEventListener('change', handleThemeChange);
        }

        function selectAllText() {
            var textInput = document.getElementById('textInput');
            textInput.select();
            textInput.setSelectionRange(0, 99999);
        }

        function copyText() {
            var textInput = document.getElementById('textInput');
            var currentLang = getBrowserLanguage();
            var lang = translations[currentLang] || translations['zh-CN'];

            textInput.select();
            textInput.setSelectionRange(0, 99999);

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(textInput.value).then(function () {
                        showCopySuccess();
                    }).catch(function () {
                        fallbackCopy(lang);
                    });
                } else {
                    fallbackCopy(lang);
                }
            } catch (err) {
                alert(lang.copyFailed);
            }
        }

        function fallbackCopy(lang) {
            var textInput = document.getElementById('textInput');
            var success = document.execCommand('copy');
            if (success) {
                showCopySuccess();
            } else {
                alert(lang.copyFailed);
            }
        }

        function showCopySuccess() {
            var currentLang = getBrowserLanguage();
            var lang = translations[currentLang] || translations['zh-CN'];
            var copyButton = document.querySelector('.copy-button');
            var copyIcon = copyButton.querySelector('.copy-icon');
            var originalIcon = copyIcon.innerHTML;

            copyIcon.innerHTML = '<path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z"/>';
            copyButton.style.backgroundColor = '#4CAF50';
            copyButton.title = lang.copySuccess;

            setTimeout(function () {
                copyIcon.innerHTML = originalIcon;
                copyButton.style.backgroundColor = '#ff5c00';
                copyButton.title = lang.copyLabel || '复制';
            }, 2000);
        }

        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function closePage() {
            try {
                window.opener = null;
                window.open('', '_self');
                window.close();
                setTimeout(function () {
                    if (!window.closed) showCloseHint();
                }, 200);
            } catch (error) {
                showCloseHint();
            }
        }

        function showCloseHint() {
            var currentLang = getBrowserLanguage();
            var lang = translations[currentLang] || translations['zh-CN'];
            var hint = document.getElementById('closeHint');
            if (hint) {
                hint.textContent = lang.closeHintContent;
                hint.style.display = 'block';
            }
        }

        window.onload = function () {
            detectThemeChange();

            var currentLang = getBrowserLanguage();
            var lang = translations[currentLang] || translations['zh-CN'];

            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');
            var state = urlParams.get('state');
            var oauthError = urlParams.get('error');
            var oauthErrorDesc = urlParams.get('error_description');

            // OAuth 明确错误
            if (oauthError) {
                var friendlyMsg = (lang.oauthErrors && lang.oauthErrors[oauthError]) || lang.errorTitle;
                document.getElementById('pageTitle').textContent = lang.errorTitle;
                document.getElementById('titleArea').textContent = lang.errorTitle;
                document.getElementById('authInfoContainer').style.display = 'none';
                var contentArea = document.getElementById('contentArea');
                contentArea.textContent = lang.errorContent;
                if (oauthErrorDesc) {
                    var descEl = document.createElement('span');
                    descEl.style.cssText = 'display:block;font-size:14px;opacity:.7;';
                    descEl.textContent = oauthErrorDesc;
                    contentArea.appendChild(descEl);
                }
                var codeEl = document.createElement('span');
                codeEl.style.cssText = 'display:block;font-size:13px;opacity:.5;';
                codeEl.textContent = '(' + friendlyMsg + ')';
                contentArea.appendChild(codeEl);
                return;
            }

            // 无参数
            if (!code || !state) {
                document.getElementById('pageTitle').textContent = lang.noParamsTitle;
                document.getElementById('titleArea').textContent = lang.noParamsTitle;
                document.getElementById('authInfoContainer').style.display = 'none';
                document.getElementById('contentArea').textContent = lang.noParamsContent;
                return;
            }

            // 成功：编码并展示
            document.getElementById('pageTitle').textContent = lang.title;
            document.getElementById('titleArea').textContent = lang.title;
            document.getElementById('contentArea').textContent = lang.content;

            try {
                var encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ code: code, state: state }))));
                document.getElementById('textInput').value = encoded;
            } catch (e) {
                alert(lang.encodingFailed);
            }
        };
    </script>
</body>

</html>
